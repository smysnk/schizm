apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schizm.webName" . }}
  labels:
    {{- include "schizm.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "schizm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "schizm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      annotations:
        {{- toYaml .Values.web.podAnnotations | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range .Values.image.pullSecrets }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "schizm.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.web.args | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "schizm.webConfigMapName" . }}
            {{- if or .Values.web.existingSecret (gt (len (default (dict) .Values.web.secret)) 0) }}
            - secretRef:
                name: {{ include "schizm.webSecretName" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.web.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.web.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.web.affinity | nindent 8 }}
