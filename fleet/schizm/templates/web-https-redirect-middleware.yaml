{{- $httpsRedirect := default (dict) .Values.web.ingress.httpsRedirect -}}
{{- if and .Values.web.ingress.enabled (default false $httpsRedirect.enabled) (eq (.Values.web.ingress.className | default "") "traefik") }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "schizm.httpsRedirectMiddlewareName" . }}
  labels:
    {{- include "schizm.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  redirectScheme:
    scheme: https
    permanent: {{ default true $httpsRedirect.permanent }}
{{- end }}
