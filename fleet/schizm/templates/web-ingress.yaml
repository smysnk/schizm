{{- if .Values.web.ingress.enabled }}
{{- $hosts := default (list) .Values.web.ingress.hosts -}}
{{- $host := .Values.web.ingress.host | default (include "schizm.publicDomain" . | trim) -}}
{{- $apiPaths := default (list) .Values.api.ingressPaths -}}
{{- $tls := default (dict) .Values.web.ingress.tls -}}
{{- $annotations := dict -}}
{{- with .Values.web.ingress.annotations }}
  {{- range $key, $value := . }}
    {{- $_ := set $annotations $key $value -}}
  {{- end }}
{{- end }}
{{- $httpsRedirect := default (dict) .Values.web.ingress.httpsRedirect -}}
{{- if and (default false $httpsRedirect.enabled) (eq (.Values.web.ingress.className | default "") "traefik") -}}
  {{- $middlewareRef := printf "%s@kubernetescrd" (include "schizm.httpsRedirectMiddlewareQualifiedName" . | trim) -}}
  {{- $existingMiddlewares := get $annotations "traefik.ingress.kubernetes.io/router.middlewares" | default "" -}}
  {{- if $existingMiddlewares -}}
    {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" (printf "%s,%s" $existingMiddlewares $middlewareRef) -}}
  {{- else -}}
    {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" $middlewareRef -}}
  {{- end -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "schizm.webName" . }}
  labels:
    {{- include "schizm.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- if gt (len $annotations) 0 }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  rules:
    {{- if gt (len $hosts) 0 }}
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range $apiPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "schizm.apiName" $ }}
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "schizm.webName" $ }}
                port:
                  number: {{ $.Values.web.service.port }}
          {{- end }}
    {{- end }}
    {{- else if $host }}
    - host: {{ $host | quote }}
      http:
        paths:
          {{- range $apiPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "schizm.apiName" $ }}
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
          - path: {{ $.Values.web.ingress.path }}
            pathType: {{ $.Values.web.ingress.pathType }}
            backend:
              service:
                name: {{ include "schizm.webName" $ }}
                port:
                  number: {{ $.Values.web.service.port }}
    {{- end }}
  {{- if kindIs "slice" $tls }}
  tls:
    {{- toYaml $tls | nindent 4 }}
  {{- else if and (kindIs "map" $tls) $tls.enabled }}
  tls:
    - hosts:
        {{- if gt (len (default (list) $tls.hosts)) 0 }}
        {{- range $tls.hosts }}
        - {{ . | quote }}
        {{- end }}
        {{- else if gt (len $hosts) 0 }}
        {{- range $hosts }}
        - {{ .host | quote }}
        {{- end }}
        {{- else if $host }}
        - {{ $host | quote }}
        {{- end }}
      secretName: {{ default (include "schizm.defaultTlsSecretName" . | trim) $tls.secretName | quote }}
  {{- end }}
{{- end }}
